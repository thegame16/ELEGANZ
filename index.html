<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Profit Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro Splash / Logo Morph -->
<div id="intro">
    <img src="logo.jpeg" class="logo" alt="App Logo">
</div>

<!-- Main App -->
<div id="app">

<header>
<h1>Business Tracker</h1>
</header>

<div class="dashboard">
    <div class="card purchase">
        <h3>Total Purchases</h3>
        <p id="totalPurchases">0</p>
    </div>

    <div class="card sale">
        <h3>Total Sales</h3>
        <p id="totalSales">0</p>
    </div>

    <div class="card profit">
        <h3>Profit / Loss</h3>
        <p id="profit">0</p>
    </div>
</div>

<section class="transaction-section">
<h2>Add Transaction</h2>
<div class="form">
    <input type="text" id="item" placeholder="Item Name">
    <input type="number" id="quantity" placeholder="Quantity">
    <input type="number" id="cost" placeholder="Cost Price">
    <input type="number" id="price" placeholder="Selling Price">
    <select id="type">
        <option value="purchase">Purchased</option>
        <option value="sale">Sold</option>
    </select>
    <button onclick="addTransaction()">Save</button>
</div>
</section>

<section class="transaction-log">
<h2>Transaction Log</h2>
<div class="table-container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Item</th>
<th>Qty</th>
<th>Cost</th>
<th>Price</th>
<th>Type</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>
</div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
